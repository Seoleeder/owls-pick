events {
    # 워커 프로세스 1개당 최대 동시 연결 수
    worker_connections 1024;
}

http {

    # OS 커널 레벨에서 정적 파일 전송 최적화
    sendfile on;

    # 응답 헤더 내 Nginx 버전 정보 노출 차단
    server_tokens off;

    # 클라이언트 유휴 TCP 연결 유지 시간 설정
    keepalive_timeout 65;

    # 액세스 및 에러 로그 저장 경로 지정
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # SSL 핸드셰이크 부하를 줄이기 위한 세션 캐시 설정
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 취약점이 제거된 최신 TLS 버전만 허용
    ssl_protocols TLSv1.2 TLSv1.3;


    # ------------------------------------------
    #  API 서버 (api.owls-pick.com)
    # ------------------------------------------

    # HTTP (80) -> HTTPS (443) 강제 리다이렉트
    server {
        # 외부 HTTP 요청 수신 포트 바인딩
        listen 80;
        # 트래픽 수용 대상 도메인 식별자 지정
        server_name api.owls-pick.com;

        # Let's Encrypt 도메인 소유권 인증 경로
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # HTTP 요청을 HTTPS로 강제 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (443) 리버스 프록시 설정
    server {
        # HTTPS 요청 수신 포트 바인딩 및 SSL 암호화 적용
        listen 443 ssl;
        server_name api.owls-pick.com;

        # 발급된 SSL 인증서 및 개인키 경로 연결
        ssl_certificate /etc/letsencrypt/live/api.owls-pick.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.owls-pick.com/privkey.pem;

        # Spring Boot API 서버로 트래픽 포워딩
        location / {
            # 요청을 내부망의 Spring Boot 컨테이너 포트로 포워딩
            proxy_pass http://owls-pick-api:8080;

            # 백엔드로 원본 클라이언트 IP 및 프로토콜 정보 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 프록시 연결 및 응답 대기 제한 시간 설정
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }

    # ------------------------------------------
    #  Grafana 모니터링 서버 (monitor.owls-pick.com)
    # ------------------------------------------

    # HTTP (80) -> HTTPS (443) 강제 리다이렉트
    server {
        listen 80;
        server_name monitor.owls-pick.com;

        # Let's Encrypt 도메인 소유권 인증 경로
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (443) 프록시 및 웹소켓 설정
    server {
        # HTTPS 요청 수신 포트 바인딩 및 SSL 암호화 적용
        listen 443 ssl;
        server_name monitor.owls-pick.com;

        # SSL 인증서 및 개인키 경로 지정 (동일 인증서 사용)
        ssl_certificate /etc/letsencrypt/live/api.owls-pick.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.owls-pick.com/privkey.pem;

        # 그라파나 컨테이너로 트래픽 포워딩
        location / {
            # 요청을 내부망의 Grafana 컨테이너 포트로 포워딩
            proxy_pass http://grafana:3000;

            # 기본 프록시 헤더 주입
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 그라파나 실시간 웹소켓 통신을 위한 프로토콜 업그레이드
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;

            # 프록시 연결 및 응답 대기 제한 시간 설정
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }
}

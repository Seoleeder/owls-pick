spring:
  application:
    name: "owls-pick-api"
  profiles:
    active: dev # 기본 프로필 지정 (도커에서는 환경변수로 덮어씀)
  datasource:
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
    driver-class-name: org.postgresql.Driver
    username: postgres
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        provider:
          google:
            authorization-uri: "https://accounts.google.com/o/oauth2/v2/auth"
            token-uri: "https://oauth2.googleapis.com/token"
            user-info-uri: "https://openidconnect.googleapis.com/v1/userinfo"
            jwk-set-uri: "https://www.googleapis.com/oauth2/v3/certs"
            user-name-attribute: sub
          kakao:
            authorization-uri: "https://kauth.kakao.com/oauth/authorize"
            token-uri: "https://kauth.kakao.com/oauth/token"
            user-info-uri: "https://kapi.kakao.com/v1/oidc/userinfo"
            jwk-set-uri: "https://kauth.kakao.com/.well-known/jwks.json"
            user-name-attribute: sub
          naver:
            authorization-uri: "https://nid.naver.com/oauth2/authorize"
            token-uri: "https://nid.naver.com/oauth2/token"
            user-info-uri: "https://openapi.naver.com/v1/nid/me"
            jwk-set-uri: "https://nid.naver.com/oauth2/jwks"
            user-name-attribute: sub

external-api:
  steam:
    key: ${STEAM_WEB_API_KEY}
    base-url:
      store: "store.steampowered.com"
      web: "api.steampowered.com"
    sync:
      thread-pool-size: 5
    review:
      min-votes-up: 2
      init-batch-size: 50
      maintenance-batch-size: 200
      max-retry: 5
      backoff-base-ms: 1000
    dashboard:
      min-collection-date: "2022-01-01"
      country-code: "KR"
      page-count: 100
  igdb:
    client-id: ${IGDB_CLIENT_ID}
    client-secret: ${IGDB_CLIENT_SECRET}
    base-url: "api.igdb.com"
    auth-url: "id.twitch.tv"
    image-url: "images.igdb.com/igdb/image/upload/t_thumb"
  itad:
    key: ${ITAD_WEB_API_KEY}
    base-url: "api.isthereanydeal.com"
    batch-size: 200
    sync-thread-pool-size: 6

owls-pick:
  admin-key: ${INITIALIZATION_ADMIN_KEY}
  scheduler:
    enabled: true  # 스케줄러 활성화 여부 기본값
  curation:
    upcoming:
      min-hypes: 5
      period-months: 12
    intersection:
      min-required-games: 10
    hidden-masterpiece:
      min-reviews: 50
      max-reviews: 3000
      min-review-score: 8
    trending:
      days-range: 7
      min-review-score: 8
    short-playtime:
      max-playtime: 600

jwt:
  header: Authorization
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-token-validity: 1209600000

firebase:
  config:
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64}

resilience4j:
  ratelimiter:
    instances:
      steamApi:
        limitForPeriod: 25
        limitRefreshPeriod: 1s
        timeoutDuration: 2m
      itadApi:
        limitForPeriod: 15
        limitRefreshPeriod: 1s
        timeoutDuration: 30s
  retry:
    instances:
      steamApi:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.RestClientException
      itadApi:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.RestClientException

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  api-docs:
    path: /v3/api-docs

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: "health, info, prometheus"
  metrics:
    tags:
      application: "owls-pick-api"


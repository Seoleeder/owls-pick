spring:
  application:
    name: "owls-pick-api"
  config:
    activate:
      on-profile: test

  datasource:
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
    driver-class-name: org.postgresql.Driver
    username: postgres

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: none
      metadata_builder_contributor: io.github.seoleeder.owls_pick.global.config.CustomPostgreSQLFunctionContributor
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        provider:
          google:
            authorization-uri: "https://accounts.google.com/o/oauth2/v2/auth"
            token-uri: "https://oauth2.googleapis.com/token"
            user-info-uri: "https://openidconnect.googleapis.com/v1/userinfo"
            jwk-set-uri: "https://www.googleapis.com/oauth2/v3/certs"
            user-name-attribute: sub
          kakao:
            authorization-uri: "https://kauth.kakao.com/oauth/authorize"
            token-uri: "https://kauth.kakao.com/oauth/token"
            user-info-uri: "https://kapi.kakao.com/v1/oidc/userinfo"
            jwk-set-uri: "https://kauth.kakao.com/.well-known/jwks.json"
            user-name-attribute: sub
          naver:
            authorization-uri: "https://nid.naver.com/oauth2/authorize"
            token-uri: "https://nid.naver.com/oauth2/token"
            user-info-uri: "https://openapi.naver.com/v1/nid/me"
            jwk-set-uri: "https://nid.naver.com/oauth2/jwks"
            user-name-attribute: sub
        registration:
          google:
            client-id: "test-google-id"
            client-secret: "test-google-secret"
            scope: [email, profile, openid]
            redirect-uri: "http://localhost:8080/api/auth/login/google"
            authorization-grant-type: "authorization_code"
            client-name: "google"
          kakao:
            client-id: "test-kakao-id"
            client-secret: "test-kakao-secret"
            scope: [profile_nickname, account_email, openid]
            redirect-uri: "http://localhost:8080/api/auth/login/kakao"
            client-authentication-method: "client_secret_post"
            authorization-grant-type: "authorization_code"
            client-name: "kakao"
          naver:
            client-id: "test-naver-id"
            client-secret: "test-naver-secret"
            scope: [openid]
            redirect-uri: "http://localhost:8080/api/auth/login/naver"
            authorization-grant-type: "authorization_code"
            client-name: "naver"

external-api:
  steam:
    key: "test-steam-key"
    base-url:
      store: "store.steampowered.com"
      web: "api.steampowered.com"
    sync:
      thread-pool-size: 5
    review:
      min-votes-up: 2
      init-batch-size: 50
      maintenance-batch-size: 200
      max-retry: 5
      backoff-base-ms: 1000
    dashboard:
      min-collection-date: "2022-01-01"
      country-code: "KR"
      page-count: 100
  igdb:
    client-id: "test-igdb-id"
    client-secret: "test-igdb-secret"
    base-url: "api.igdb.com"
    auth-url: "id.twitch.tv"
    image-url: "images.igdb.com/igdb/image/upload/t_thumb"
  itad:
    key: "test-itad-key"
    base-url: "api.isthereanydeal.com"
    batch-size: 200
    sync-thread-pool-size: 15
  hltb:
    fastapi-url: "http://localhost:8000"
    chunk-size: 30

owls-pick:
  admin-key: "test-admin-key"
  curation:
    upcoming:
      min-hypes: 5
      period-months: 12
    intersection:
      min-required-games: 10
    hidden-masterpiece:
      min-reviews: 50
      max-reviews: 3000
      min-review-score: 8
    trending:
      days-range: 7
      min-review-score: 8
    short-playtime:
      max-playtime: 600

jwt:
  header: Authorization
  secret: "dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci10ZXN0aW5nLWhzNTEyLWFsZ29yaXRobS1tdXN0LWJlLWF0LWxlYXN0LTY0LWJ5dGVz"
  expiration: 86400000
  refresh-token-validity: 1209600000

firebase:
  config:
    path: "firebase/test-firebase-service-account.json"

resilience4j:
  ratelimiter:
    instances:
      steamApi:
        limitForPeriod: 25
        limitRefreshPeriod: 1s
        timeoutDuration: 2m
      itadApi:
        limitForPeriod: 15
        limitRefreshPeriod: 1s
        timeoutDuration: 30s
  retry:
    instances:
      steamApi:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.RestClientException
      itadApi:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.RestClientException

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    title: OwlsPick API
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true
    doc-expansion: none

management:
  metrics:
    tags:
      application: "owls-pick-api"
  endpoints:
    web:
      exposure:
        include: "prometheus, health"

internal-api:
  genai:
    fastapi-url: "http://localhost:8000"
    localization:
      chunk-size:
        game: 100
        keyword: 200
    review:
      min-threshold: 50
      batch-size: 10
      max-concurrent-tasks: 10
    embedding:
      db-fetch-size: 1000
      api-batch-size: 100
      max-concurrent-tasks: 5
    chat:
      history-limit: 10
      traffic:
        prefix:
          lock: "chat:lock:"
          rate-limit: "chat:rate_limit:"
        limit:
          max-requests-per-minute: 5

cors:
  allowed-origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allowed-headers: ["*"]
  exposed-headers: ["Authorization"]
  allow-credentials: true
  max-age: 3600

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.type.descriptor.sql.BasicBinder: warn
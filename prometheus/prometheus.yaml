global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'owls-pick-spring-boot' # Spring Boot 수집 작업명
    metrics_path: '/actuator/prometheus'  # 메트릭 엔드포인트
    static_configs:
      - targets: ['host.docker.internal:8080']  # 로컬 호스트 서버 (도커 -> 호스트 방향)

  - job_name: 'owls-pick-fastapi' # FastAPI 수집 작업명
    metrics_path: '/metrics'  # 메트릭 엔드포인트
    static_configs:
      - targets: ['host.docker.internal:8000'] # 로컬 호스트 서버 (도커 -> 호스트 방향)